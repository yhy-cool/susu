name: Docker Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建并推送镜像（最简单的写法）
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: yhycool/susu-app:latest

      # 服务器部署
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 配置可用 Docker 镜像源（解决国内服务器无法直连 Docker Hub 问题）
            mkdir -p /etc/docker
            echo '{"registry-mirrors":["https://docker.1panel.live"]}' > /etc/docker/daemon.json
            systemctl restart docker
            sleep 3
            docker network create susu-net 2>/dev/null || true
            # MySQL 容器（首次部署时自动创建，后续不重复创建）
            docker inspect susu-mysql >/dev/null 2>&1 || docker run -d --name susu-mysql --network susu-net -e MYSQL_ROOT_PASSWORD=root -e MYSQL_DATABASE=lanyuel -v susu-mysql-data:/var/lib/mysql --restart=always mysql:8.0 --default-authentication-plugin=mysql_native_password
            sleep 5
            # 更新 susu 应用容器
            docker stop susu-container 2>/dev/null || true
            docker rm susu-container 2>/dev/null || true
            docker pull yhycool/susu-app:latest
            docker run -d --name susu-container --network susu-net -p 3000:3001 --restart=always -e DB_HOST=susu-mysql -e DB_USER=root -e DB_PASSWORD=root -e DB_NAME=lanyuel yhycool/susu-app:latest
            docker image prune -f
